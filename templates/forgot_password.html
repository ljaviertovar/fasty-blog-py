{% extends "layout.html" %} {% block content %}
<div
  class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg py-3 px-4 mb-4 w-full"
>
  <h2 class="mb-4 text-lg font-semibold text-gray-900 dark:text-gray-100">
    Forgot Password
  </h2>
  <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
    Enter your email address and we'll send you a link to reset your password.
  </p>
  <form id="forgotPasswordForm" class="space-y-5 flex flex-col gap-4">
    <div>
      <label
        for="email"
        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >Email</label
      >
      <input
        type="email"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
        id="email"
        name="email"
        required
        autofocus
      />
    </div>
    <button
      type="submit"
      class="w-full px-3 py-2 bg-steel text-white font-medium rounded-md hover:bg-steel-dark focus:outline-none focus:ring-2 focus:ring-steel transition-colors mt-6"
      id="submitBtn"
    >
      Send Reset Link
    </button>
  </form>
  <p class="mt-3 py-3 text-xs text-center text-gray-600 dark:text-gray-400">
    Remember your password?
    <a
      href="{{ url_for('login_page') }}"
      class="text-steel dark:text-blue-400 hover:text-steel-dark dark:hover:text-blue-300 font-medium"
      >Login here</a
    >
  </p>
</div>
{% endblock content %} {% block scripts %}
<script type="module">
  import { getErrorMessage, showModal } from "/static/js/utils.js";

  const forgotPasswordForm = document.getElementById("forgotPasswordForm");
  const submitBtn = document.getElementById("submitBtn");

  forgotPasswordForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    // Disable button during submission
    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";

    const formData = new FormData(forgotPasswordForm);
    const data = Object.fromEntries(formData.entries());

    try {
      const response = await fetch("/api/users/forgot_password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(data),
      });

      // Always show success message (even if email doesn't exist - security)
      if (response.status === 202) {
        document.getElementById("successMessage").textContent =
          "If an account exists with this email, you will receive password reset instructions shortly.";
        showModal("successModal");

        // Clear form
        forgotPasswordForm.reset();
      } else {
        const error = await response.json();
        document.getElementById("errorMessage").textContent =
          getErrorMessage(error);
        showModal("errorModal");
      }
    } catch (error) {
      document.getElementById("errorMessage").textContent =
        "Network error. Please check your connection and try again.";
      showModal("errorModal");
    } finally {
      // Re-enable button
      submitBtn.disabled = false;
      submitBtn.textContent = "Send Reset Link";
    }
  });
</script>
{% endblock scripts %}
