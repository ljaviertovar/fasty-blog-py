{% extends "layout.html" %}
{% block content %}
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg py-3 px-4 mb-4 w-full">
        <h2 class="mb-4 text-lg font-semibold text-gray-900 dark:text-gray-100">Reset Password</h2>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Enter your new password below.</p>
        <form id="resetPasswordForm" class="space-y-5 flex flex-col gap-4">
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">New Password</label>
                <input type="password"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
                       id="new_password"
                       name="new_password"
                       required
                       autofocus
                       minlength="8">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Confirm Password</label>
                <input type="password"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
                       id="confirm_password"
                       name="confirm_password"
                       required
                       minlength="8">
            </div>
            <button type="submit" class="w-full px-3 py-2 bg-steel text-white font-medium rounded-md hover:bg-steel-dark focus:outline-none focus:ring-2 focus:ring-steel transition-colors mt-6" id="submitBtn">Reset Password</button>
        </form>
        <p class="mt-3 py-3 text-xs text-center text-gray-600 dark:text-gray-400">
            Remember your password? <a href="{{ url_for("login_page") }}" class="text-steel dark:text-blue-400 hover:text-steel-dark dark:hover:text-blue-300 font-medium">Login here</a>
        </p>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module">
        import { getErrorMessage, showModal } from '/static/js/utils.js';

        const resetPasswordForm = document.getElementById('resetPasswordForm');
        const submitBtn = document.getElementById('submitBtn');

        // Extract token from URL query params
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('errorMessage').textContent = 'Invalid or missing reset token.';
            showModal('errorModal');
            resetPasswordForm.style.display = 'none';
        }

        resetPasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (newPassword !== confirmPassword) {
                document.getElementById('errorMessage').textContent = 'Passwords do not match.';
                showModal('errorModal');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const response = await fetch('/api/users/reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword }),
                });

                if (response.ok) {
                    document.getElementById('successMessage').textContent =
                        'Your password has been reset successfully. You can now log in.';
                    showModal('successModal');
                    resetPasswordForm.reset();
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    const error = await response.json();
                    document.getElementById('errorMessage').textContent = getErrorMessage(error);
                    showModal('errorModal');
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent =
                    'Network error. Please check your connection and try again.';
                showModal('errorModal');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
{% endblock scripts %}
