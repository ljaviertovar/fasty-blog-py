{% extends "layout.html" %} {% block content %}
<div
  class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg py-3 px-4 mb-4 w-full"
>
  <h2 class="mb-4 text-lg font-semibold text-gray-900 dark:text-gray-100">
    Login
  </h2>
  <form id="loginForm" class="space-y-5 flex flex-col gap-4">
    <div>
      <label
        for="email"
        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >Email</label
      >
      <input
        type="email"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
        id="email"
        name="username"
        required
      />
    </div>
    <div>
      <label
        for="password"
        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >Password</label
      >
      <input
        type="password"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
        id="password"
        name="password"
        required
      />
    </div>
    <button
      type="submit"
      class="w-full px-3 py-2 bg-steel text-white font-medium rounded-md hover:bg-steel-dark focus:outline-none focus:ring-2 focus:ring-steel transition-colors mt-6"
    >
      Login
    </button>
  </form>
  <div class="flex items-center justify-between mt-4">
    <a
      href="{{ url_for('forgot_password_page') }}"
      class="text-sm text-steel dark:text-blue-400 hover:text-steel-dark dark:hover:text-blue-300 font-medium"
      >Forgot Password?</a
    >

    <p class="mt-3 py-3 text-sm text-center text-gray-600 dark:text-gray-400">
      Don't have an account?
      <a
        href="{{ url_for('register_page') }}"
        class="text-steel dark:text-blue-400 hover:text-steel-dark dark:hover:text-blue-300 font-medium"
        >Register here</a
      >
    </p>
  </div>
</div>
{% endblock content %} {% block scripts %}
<script type="module">
  import { getErrorMessage, showModal } from "/static/js/utils.js";

  const loginForm = document.getElementById("loginForm");

  loginForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const formData = new FormData(loginForm);

    try {
      // OAuth2PasswordRequestForm expects form data, not JSON
      const response = await fetch("/api/users/token", {
        method: "POST",
        body: formData,
      });

      if (response.ok) {
        const data = await response.json();

        // Store token in localStorage
        localStorage.setItem("access_token", data.access_token);

        // Show success modal then redirect
        document.getElementById("successMessage").textContent =
          "Login successful!";
        showModal("successModal");
        setTimeout(() => {
          window.location.href = "/";
        }, 500);
      } else {
        const error = await response.json();
        document.getElementById("errorMessage").textContent =
          getErrorMessage(error);
        showModal("errorModal");
      }
    } catch (error) {
      document.getElementById("errorMessage").textContent =
        "Network error. Please check your connection and try again.";
      showModal("errorModal");
    }
  });
</script>
{% endblock scripts %}
