{% extends "layout.html" %}
{% block content %}
<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg py-3 px-4 mb-4 w-full">
    <h2 class="mb-4 text-lg font-semibold text-gray-900 dark:text-gray-100">Register</h2>
    <form id="registerForm" class="space-y-5 flex flex-col gap-4">
        <div>
            <label for="username"
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
            <input type="text"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
                id="username" name="username" required minlength="1" maxlength="50">
        </div>
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input type="email"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
                id="email" name="email" required>
        </div>
        <div>
            <label for="password"
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <input type="password"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
                id="password" name="password" required minlength="8">
            <div class="mt-1 text-xs text-gray-500 dark:text-gray-400">Must be at least 8 characters.</div>
        </div>
        <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Confirm
                Password</label>
            <input type="password"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-steel"
                id="confirmPassword" name="confirmPassword" required minlength="8">
            <div id="passwordError" class="mt-1 text-xs text-red-600 dark:text-red-400 hidden">Passwords do not match.
            </div>
        </div>
        <button type="submit"
            class="w-full px-3 py-2 bg-steel text-white font-medium rounded-md hover:bg-steel-dark focus:outline-none focus:ring-2 focus:ring-steel transition-colors mt-6">Register</button>
    </form>
    <p class="mt-3 py-3 text-xs text-center text-gray-600 dark:text-gray-400">
        Already have an account? <a href="{{ url_for("login_page") }}"
            class="text-steel dark:text-blue-400 hover:text-steel-dark dark:hover:text-blue-300 font-medium">Login
            here</a>
    </p>
</div>
{% endblock content %}

{% block scripts %}
<script type="module">
    import { getErrorMessage, showModal } from '/static/js/utils.js';

    const registerForm = document.getElementById('registerForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordError = document.getElementById('passwordError');

    // Check passwords match on input
    confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value !== confirmPasswordInput.value) {
            passwordError.classList.remove('hidden');
            confirmPasswordInput.setCustomValidity('Passwords do not match');
        } else {
            passwordError.classList.add('hidden');
            confirmPasswordInput.setCustomValidity('');
        }
    });

    registerForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        // Check passwords match
        if (passwordInput.value !== confirmPasswordInput.value) {
            passwordError.classList.remove('hidden');
            return;
        }

        const formData = new FormData(registerForm);
        const userData = {
            username: formData.get('username'),
            email: formData.get('email'),
            password: formData.get('password'),
        };

        try {
            const response = await fetch('/api/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(userData),
            });

            if (response.ok) {
                // Show success modal then redirect
                document.getElementById('successMessage').textContent = 'Account created successfully! Please login.';
                showModal('successModal');
                setTimeout(() => { window.location.href = '/login'; }, 500);
            } else {
                const error = await response.json();
                document.getElementById('errorMessage').textContent = getErrorMessage(error);
                showModal('errorModal');
            }
        } catch (error) {
            document.getElementById('errorMessage').textContent =
                'Network error. Please check your connection and try again.';
            showModal('errorModal');
        }
    });
</script>
{% endblock scripts %}
