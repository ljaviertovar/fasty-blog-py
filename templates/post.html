{% extends "layout.html" %} {% block content %}
<article class="content-section py-3 px-4 mb-4">
  <div class="flex items-start gap-4">
    <img
      class="rounded-full flex-shrink-0 w-16 h-16 object-cover border border-gray-200 dark:border-gray-600"
      src="{{ post.author.image_path }}"
      alt="{{ post.author.username }}'s profile picture"
      width="64"
      height="64"
      loading="lazy"
    />
    <div class="flex-1">
      <div
        class="mb-2 flex items-center gap-2 pb-0.5 border-b border-gray-200 dark:border-gray-700"
      >
        <a
          class="text-steel dark:text-blue-400 hover:text-blue-600 dark:hover:text-blue-300 font-medium"
          href="#"
          >{{ post.author.username }}</a
        >
        <small class="text-gray-500 dark:text-gray-400 text-xs"
          >{{ post.date_posted.strftime("%B %d, %Y") }}</small
        >
      </div>
      <h2 class="article-title font-heading text-4xl mb-1">
        <a
          class="text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
          href="#"
          >{{ post.title }}</a
        >
      </h2>
      <p
        class="article-content text-gray-600 dark:text-gray-300 text-lg whitespace-pre-line"
      >
        {{ post.content }}
      </p>
      <div
        class="post-actions mt-3 pt-3 border-t border-gray-200 dark:border-gray-700"
      >
        <a
          class="inline-flex items-center px-3 py-1 border rounded-md text-sm text-gray-500 border-gray-300 hover:bg-gray-100 mr-1"
          href="#"
          >Edit Post</a
        >
        <button
          type="button"
          class="inline-flex items-center px-3 py-1 border rounded-md text-sm text-red-600 border-red-300 hover:bg-red-50"
          data-bs-toggle="modal"
          data-bs-target="#deleteModal"
        >
          Delete Post
        </button>
      </div>
    </div>
  </div>
</article>

<!-- Delete Confirmation Modal (estructura + clases Tailwind; JS para abrir/cerrar no incluido) -->
<div
  id="deleteModal"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-50"
>
  <div class="max-w-md w-full mx-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden">
      <div
        class="flex items-start justify-between p-4 border-b border-gray-200 dark:border-gray-700"
      >
        <h5 class="text-lg font-medium">Delete Post?</h5>
        <button
          type="button"
          class="text-gray-500 hover:text-gray-700"
          aria-label="Close"
        >
          ×
        </button>
      </div>
      <form action="#">
        <div class="p-4">
          Are you sure you want to delete this post? This action cannot be
          undone.
        </div>
        <div
          class="flex justify-end gap-2 p-4 border-t border-gray-100 dark:border-gray-700"
        >
          <button
            type="button"
            class="px-3 py-1 border rounded-md text-sm text-gray-700 border-gray-300 hover:bg-gray-100"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="px-3 py-1 border rounded-md text-sm text-red-600 border-red-300 hover:bg-red-50"
          >
            Delete
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
