{% extends "layout.html" %}
{% block content %}
  {% for post in posts %}
    <article class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm hover:shadow-md hover:border-gray-300 dark:hover:border-gray-600 transition-all py-3 px-4 mb-4">
      <div class="flex items-start gap-4">
        <img class="rounded-full w-16 h-16 object-cover border border-gray-200 dark:border-gray-600 shrink-0 ring-2 ring-white dark:ring-gray-800"
             src="{{ url_for('static', path='profile_pics/default.jpg') }}"
             alt="{{ post.author }}'s profile picture"
             width="64"
             height="64"
             loading="lazy">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-2 pb-0.5 border-b border-gray-200 dark:border-gray-700">
            <a class="text-steel dark:text-blue-400 hover:text-blue-600 dark:hover:text-blue-300 font-medium transition-colors"
               href="{{ url_for('post_detail', post_id=post.id) }}">{{ post.author }}</a>
            <small class="text-gray-500 dark:text-gray-400 text-xs">{{ post.date_posted }}</small>
          </div>
          <h2 class="font-heading text-xl mb-1">
            <a class="text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
               href="{{ url_for('post_detail', post_id=post.id) }}">{{ post.title }}</a>
          </h2>
          <p class="text-gray-600 dark:text-gray-300 text-lg whitespace-pre-line">{{ post.content }}</p>
        </div>
      </div>
    </article>
  {% endfor %}
{% endblock content %}
