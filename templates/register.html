{% extends "layout.html" %}
{% block content %}
    <div class="py-3 px-4 mb-4 max-w-md mx-auto">
        <h2 class="mb-4 text-2xl font-bold">Register</h2>
        <form id="registerForm">
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                       id="username"
                       name="username"
                       required
                       minlength="1"
                       maxlength="50">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" id="email" name="email" required>
            </div>
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                       id="password"
                       name="password"
                       required
                       minlength="8">
                <div class="mt-1 text-sm text-gray-500">Must be at least 8 characters.</div>
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                       id="confirmPassword"
                       name="confirmPassword"
                       required
                       minlength="8">
                <div id="passwordError" class="mt-1 text-sm text-red-600 hidden">Passwords do not match.</div>
            </div>
            <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Register</button>
        </form>
        <p class="mt-4 text-sm text-center text-gray-600">
            Already have an account? <a href="{{ url_for("login_page") }}" class="text-blue-600 hover:text-blue-700 font-medium">Login here</a>
        </p>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module">
      import { getErrorMessage, showModal } from '/static/js/utils.js';

      const registerForm = document.getElementById('registerForm');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const passwordError = document.getElementById('passwordError');

      // Check passwords match on input
      confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value !== confirmPasswordInput.value) {
          passwordError.classList.remove('hidden');
          confirmPasswordInput.setCustomValidity('Passwords do not match');
        } else {
          passwordError.classList.add('hidden');
          confirmPasswordInput.setCustomValidity('');
        }
      });

      registerForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        // Check passwords match
        if (passwordInput.value !== confirmPasswordInput.value) {
          passwordError.classList.remove('hidden');
          return;
        }

        const formData = new FormData(registerForm);
        const userData = {
          username: formData.get('username'),
          email: formData.get('email'),
          password: formData.get('password'),
        };

        try {
          const response = await fetch('/api/users', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(userData),
          });

          if (response.ok) {
            // Show success modal and redirect to login
            document.getElementById('successMessage').textContent =
              'Account created successfully! Please login.';
            showModal('successModal');

            document.getElementById('successModal').addEventListener('hidden.bs.modal', () => {
              window.location.href = '/login';
            }, { once: true });
          } else {
            const error = await response.json();
            document.getElementById('errorMessage').textContent = getErrorMessage(error);
            showModal('errorModal');
          }
        } catch (error) {
          document.getElementById('errorMessage').textContent =
            'Network error. Please check your connection and try again.';
          showModal('errorModal');
        }
      });
    </script>
{% endblock scripts %}
